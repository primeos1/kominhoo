<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A04850"/>
      <stop offset="100%" stop-color="#5E2028"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2EC9E"/>
      <stop offset="100%" stop-color="#C4CE72"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner highlight ring -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none"
        stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- K letter — vertical stem + two arms -->
  <g filter="url(#glow)">
    <!-- Vertical stem -->
    <line x1="28" y1="15" x2="28" y2="85"
          stroke="url(#kGrad)" stroke-width="13" stroke-linecap="round"/>
    <!-- Upper arm: stem mid → top-right -->
    <line x1="28" y1="50" x2="76" y2="15"
          stroke="url(#kGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- Lower arm: stem mid → bottom-right -->
    <line x1="28" y1="50" x2="76" y2="85"
          stroke="url(#kGrad)" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
